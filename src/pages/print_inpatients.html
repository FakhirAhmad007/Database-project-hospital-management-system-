<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Print In-Patients</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body { background:white; }
    .print-page { max-width:1000px;margin:0 auto;padding:30px; }
    .print-top { display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #1a1a6e; }
    .print-top h2 { color:#1a1a6e;font-size:22px; }
    .print-top p  { color:#888;font-size:13px;margin-top:4px; }
    .print-actions { display:flex;gap:10px; }
    .hospital-name { font-size:28px;font-weight:bold;color:#1a1a6e;text-align:center;margin-bottom:4px; }
    .hospital-sub  { text-align:center;color:#888;font-size:13px;margin-bottom:24px; }
    .summary-row { display:flex;gap:20px;margin-bottom:24px; }
    .summary-item { background:#f5f7ff;border-left:4px solid #1a1a6e;padding:12px 20px;border-radius:8px;flex:1; }
    .summary-item h4 { font-size:22px;color:#1a1a6e; }
    .summary-item p  { font-size:12px;color:#888; }
    @media print {
      .print-actions { display:none !important; }
      .print-page    { padding:10px; }
    }
  </style>
</head>
<body>

<div class="print-page">
  <div class="hospital-name">🏥 HospitalDB</div>
  <div class="hospital-sub">Hospital Management System — In-Patient Records</div>

  <div class="print-top">
    <div>
      <h2>In-Patient Report</h2>
      <p id="printDate"></p>
    </div>
    <div class="print-actions">
      <button class="btn-print"  onclick="window.print()">🖨️ Print</button>
      <button class="btn-export" onclick="window.print()">📄 Export PDF</button>
      <a href="inpatients.html" style="background:#f0f2f5;color:#333;padding:9px 18px;border-radius:8px;font-size:14px;text-decoration:none;display:inline-block;">← Back</a>
    </div>
  </div>

  <div class="summary-row">
    <div class="summary-item"><h4 id="totalCount">0</h4><p>Total In-Patients</p></div>
    <div class="summary-item"><h4 id="maleCount">0</h4><p>Male Patients</p></div>
    <div class="summary-item"><h4 id="femaleCount">0</h4><p>Female Patients</p></div>
    <div class="summary-item"><h4 id="totalRevenue">Rs. 0</h4><p>Total Room Revenue</p></div>
  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Admission ID</th><th>Patient Name</th><th>Admission Date</th>
          <th>Gender</th><th>Doctor</th><th>Specialization</th><th>Room No</th><th>Room Cost</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
function esc(v) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(v ?? ''));
  return d.innerHTML;
}
function handleUnauth(r) {
  if (r.status === 401) { window.location.href = 'index.html'; }
  return r;
}

document.getElementById('printDate').textContent = 'Generated: ' + new Date().toLocaleString();

fetch('../php/patients.php')
  .then(handleUnauth).then(r => r.json())
  .then(data => {
    const males   = data.filter(p => p.gender === 'Male').length;
    const females = data.filter(p => p.gender === 'Female').length;
    const revenue = data.reduce((sum, p) => sum + (parseFloat(p.roomcost) || 0), 0);

    document.getElementById('totalCount').textContent  = data.length;
    document.getElementById('maleCount').textContent   = males;
    document.getElementById('femaleCount').textContent = females;
    document.getElementById('totalRevenue').textContent = 'Rs. ' + revenue.toLocaleString();

    const tbody = document.getElementById('tbody');
    data.forEach((p, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${esc(p.admissionID)}</td>
        <td>${esc(p.patientName)}</td>
        <td>${esc(p.admissionDate)}</td>
        <td>${esc(p.gender)}</td>
        <td>${esc(p.doctorname)}</td>
        <td>${esc(p.specialization ?? '—')}</td>
        <td>Room ${esc(p.roomno)}</td>
        <td>Rs. ${esc(p.roomcost)}</td>`;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
