<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>In Patients</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .btn-edit   { background:#1a1a6e;color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;margin-right:6px; }
    .btn-delete { background:#dc3545;color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px; }
    .btn-edit:hover   { background:#00cfff; }
    .btn-delete:hover { background:#a71d2a; }
    .search-box { background:white;border-radius:12px;padding:20px 24px;margin-bottom:20px;box-shadow:0 2px 8px #00000011;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap; }
    .search-box .field { display:flex;flex-direction:column;gap:5px;flex:1;min-width:160px; }
    .search-box label  { font-size:12px;color:#555;font-weight:500; }
    .search-box input,
    .search-box select { padding:9px 13px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none; }
    .search-box input:focus,
    .search-box select:focus { border-color:#1a1a6e; }
    .btn-search { background:#1a1a6e;color:white;border:none;padding:10px 22px;border-radius:8px;font-size:14px;cursor:pointer; }
    .btn-search:hover { background:#00cfff; }
    .btn-reset  { background:#f0f2f5;color:#333;border:none;padding:10px 22px;border-radius:8px;font-size:14px;cursor:pointer; }
    .btn-reset:hover  { background:#ddd; }
    .modal-overlay { display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000066;z-index:999;align-items:center;justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:white;border-radius:12px;padding:32px;width:500px;box-shadow:0 10px 40px #00000033; }
    .modal h2 { color:#1a1a6e;margin-bottom:20px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block;font-size:13px;color:#555;margin-bottom:5px;font-weight:500; }
    .form-group input,
    .form-group select { width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:7px;font-size:14px;outline:none; }
    .form-group input:focus,
    .form-group select:focus { border-color:#1a1a6e; }
    .modal-btns { display:flex;gap:10px;margin-top:20px; }
    .btn-save   { background:#1a1a6e;color:white;border:none;padding:11px 24px;border-radius:8px;font-size:14px;cursor:pointer;flex:1; }
    .btn-save:hover   { background:#00cfff; }
    .btn-cancel { background:#f0f2f5;color:#333;border:none;padding:11px 24px;border-radius:8px;font-size:14px;cursor:pointer;flex:1; }
    .msg { margin-top:12px;padding:10px;border-radius:7px;text-align:center;font-size:13px;display:none; }
    .msg.success { background:#e8f5e9;color:#2e7d32; }
    .msg.error   { background:#ffebee;color:#c62828; }
    .no-results  { text-align:center;padding:30px;color:#888;font-size:15px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>HospitalDB</h2>
  <a href="dashboard.html"               >Dashboard</a>
  <a href="inpatients.html" class="active">In Patients</a>
  <a href="outpatients.html"             >Out Patients</a>
  <a href="doctors.html"                 >Doctors</a>
  <a href="rooms.html"                   >Rooms</a>
  <a href="billing.html"                 >Billing</a>
  <a href="#" onclick="logout()" style="position:absolute;bottom:20px;width:100%;">🚪 Logout</a>
</div>

<div class="main">
  <div class="topbar">
    <h1>In Patients</h1>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="total" style="color:#1a1a6e;font-weight:bold;"></span>
      <a href="print_inpatients.html" target="_blank" class="btn-print">🖨️ Print / PDF</a>
      <a href="add_inpatient.html" style="background:#1a1a6e;color:white;padding:9px 18px;border-radius:8px;text-decoration:none;font-size:14px;">+ Add Patient</a>
    </div>
  </div>

  <div class="search-box">
    <div class="field">
      <label>🔍 Search by Name</label>
      <input type="text" id="searchName" placeholder="e.g. Hamza">
    </div>
    <div class="field">
      <label>👨‍⚕️ Filter by Doctor</label>
      <select id="filterDoctor"><option value="">All Doctors</option></select>
    </div>
    <div class="field">
      <label>⚥ Filter by Gender</label>
      <select id="filterGender">
        <option value="">All</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>
    <div class="field">
      <label>From Date</label>
      <input type="date" id="filterFrom">
    </div>
    <div class="field">
      <label>To Date</label>
      <input type="date" id="filterTo">
    </div>
    <button class="btn-search" onclick="applyFilters()">Search</button>
    <button class="btn-reset"  onclick="resetFilters()">Reset</button>
  </div>

  <div class="table-box">
    <h2>All Admitted Patients</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Patient Name</th><th>Date</th><th>Gender</th>
          <th>Doctor</th><th>Specialization</th><th>Room</th><th>Cost</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>✏️ Edit Patient</h2>
    <input type="hidden" id="edit_admissionID">
    <div class="form-group">
      <label>Patient Name</label>
      <input type="text" id="edit_patientName">
    </div>
    <div class="form-group">
      <label>Admission Date</label>
      <input type="date" id="edit_admissionDate">
    </div>
    <div class="form-group">
      <label>Gender</label>
      <select id="edit_gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>
    <div class="form-group">
      <label>Doctor</label>
      <select id="edit_doctorid"></select>
    </div>
    <div class="form-group">
      <label>Staff</label>
      <select id="edit_staffid"></select>
    </div>
    <div class="modal-btns">
      <button class="btn-save"   onclick="saveEdit()">💾 Save Changes</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
    <div class="msg" id="editMsg"></div>
  </div>
</div>

<script>
// ── XSS-safe text escaper ────────────────────────────────────────────────────
function esc(v) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(v ?? ''));
  return d.innerHTML;
}

function logout() {
  fetch('../php/logout.php').finally(() => { window.location.href = 'index.html'; });
}
function handleUnauth(r) {
  if (r.status === 401) { window.location.href = 'index.html'; }
  return r;
}

let allPatients = [];

// Load dropdowns
fetch('../php/doctors.php').then(handleUnauth).then(r => r.json()).then(data => {
  const filter = document.getElementById('filterDoctor');
  const edit   = document.getElementById('edit_doctorid');
  data.forEach(d => {
    const optF = new Option(`${d.doctorname}`, d.doctorname);
    const optE = new Option(`${d.doctorname} — ${d.specialization}`, d.doctorid);
    filter.appendChild(optF);
    edit.appendChild(optE);
  });
});

fetch('../php/staff.php').then(handleUnauth).then(r => r.json()).then(data => {
  const sel = document.getElementById('edit_staffid');
  data.forEach(s => {
    sel.appendChild(new Option(`${s.firstname} ${s.surname}`, s.staffid));
  });
});

function loadPatients() {
  fetch('../php/patients.php').then(handleUnauth).then(r => r.json()).then(data => {
    allPatients = data;
    renderTable(data);
  });
}

function renderTable(data) {
  document.getElementById('total').textContent = `Total: ${data.length} patients`;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (data.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="9" class="no-results">😔 No patients found</td>';
    tbody.appendChild(tr);
    return;
  }

  data.forEach(p => {
    const tr = document.createElement('tr');

    // Actions cell — use data attributes to avoid onclick injection
    const editBtn = document.createElement('button');
    editBtn.className = 'btn-edit';
    editBtn.textContent = '✏️ Edit';
    editBtn.dataset.id = p.admissionID;
    editBtn.addEventListener('click', () => openEdit(p));

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-delete';
    delBtn.textContent = '🗑️ Delete';
    delBtn.dataset.id   = p.admissionID;
    delBtn.dataset.name = p.patientName;
    delBtn.addEventListener('click', () => deletePatient(p.admissionID, p.patientName));

    tr.innerHTML = `
      <td>${esc(p.admissionID)}</td>
      <td>${esc(p.patientName)}</td>
      <td>${esc(p.admissionDate)}</td>
      <td><span class="badge ${p.gender === 'Male' ? 'male' : 'female'}">${esc(p.gender)}</span></td>
      <td>${esc(p.doctorname)}</td>
      <td>${esc(p.specialization ?? '—')}</td>
      <td>Room ${esc(p.roomno)}</td>
      <td>Rs. ${esc(p.roomcost)}</td>
      <td></td>`;
    const actionCell = tr.lastElementChild;
    actionCell.appendChild(editBtn);
    actionCell.appendChild(delBtn);
    tbody.appendChild(tr);
  });
}

function applyFilters() {
  const name   = document.getElementById('searchName').value.toLowerCase();
  const doctor = document.getElementById('filterDoctor').value;
  const gender = document.getElementById('filterGender').value;
  const from   = document.getElementById('filterFrom').value;
  const to     = document.getElementById('filterTo').value;

  renderTable(allPatients.filter(p =>
    (!name   || p.patientName.toLowerCase().includes(name)) &&
    (!doctor || p.doctorname === doctor) &&
    (!gender || p.gender === gender) &&
    (!from   || p.admissionDate >= from) &&
    (!to     || p.admissionDate <= to)
  ));
}

function resetFilters() {
  ['searchName','filterDoctor','filterGender','filterFrom','filterTo']
    .forEach(id => document.getElementById(id).value = '');
  renderTable(allPatients);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('searchName').addEventListener('input',  applyFilters);
  document.getElementById('filterDoctor').addEventListener('change', applyFilters);
  document.getElementById('filterGender').addEventListener('change', applyFilters);
  document.getElementById('filterFrom').addEventListener('change',   applyFilters);
  document.getElementById('filterTo').addEventListener('change',     applyFilters);
});

loadPatients();

// openEdit now receives the full patient object — no apostrophe injection possible
function openEdit(p) {
  document.getElementById('edit_admissionID').value   = p.admissionID;
  document.getElementById('edit_patientName').value   = p.patientName;
  document.getElementById('edit_admissionDate').value = p.admissionDate;
  document.getElementById('edit_gender').value        = p.gender;
  document.getElementById('edit_doctorid').value      = p.doctorid;
  document.getElementById('edit_staffid').value       = p.staffid;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

function saveEdit() {
  const payload = {
    admissionID:   parseInt(document.getElementById('edit_admissionID').value),
    patientName:   document.getElementById('edit_patientName').value,
    admissionDate: document.getElementById('edit_admissionDate').value,
    gender:        document.getElementById('edit_gender').value,
    doctorid:      parseInt(document.getElementById('edit_doctorid').value),
    staffid:       parseInt(document.getElementById('edit_staffid').value)
  };

  fetch('../php/edit_inpatient.php', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload)
  })
  .then(handleUnauth).then(r => r.json())
  .then(data => {
    if (data.success) {
      showEditMsg('✅ Patient updated!', 'success');
      setTimeout(() => { closeModal(); loadPatients(); }, 1500);
    } else {
      showEditMsg('❌ ' + data.message, 'error');
    }
  });
}

function deletePatient(id, name) {
  if (!confirm(`Delete "${name}"?\nThis will also delete all related records.`)) return;
  fetch('../php/delete_inpatient.php', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ admissionID: id })
  })
  .then(handleUnauth).then(r => r.json())
  .then(data => {
    if (data.success) { alert('✅ Patient deleted'); loadPatients(); }
    else { alert('❌ ' + data.message); }
  });
}

function showEditMsg(text, type) {
  const msg = document.getElementById('editMsg');
  msg.textContent   = text;
  msg.className     = 'msg ' + type;
  msg.style.display = 'block';
}
</script>

</body>
</html>
